services:
  # -- MySQL Database ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: trax_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-trax}
      MYSQL_USER: ${DB_USER:-reda}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'reda', '-p${DB_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5

  # -- FastAPI Backend ---------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trax_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  # -- Next.js Frontend --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: trax_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'
    depends_on:
      - backend

  # -- DB Seeder (runs once then exits) ----------------------------------------
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trax_seeder
    command: python -m app.db.seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

volumes:
  mysql_data:
