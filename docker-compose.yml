services:
  # -- Local MySQL (dev only) --------------------------------------------------
  # On EC2 with AWS RDS, skip this with: docker compose --profile prod up
  db:
    profiles: [dev]
    image: mysql:8.0
    container_name: trax_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-trax}
      MYSQL_USER: ${DB_USER:-reda}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'reda', '-p${DB_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5

  # -- FastAPI Backend ---------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trax_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
    ports:
      - '8000:8000'

  # -- Next.js Frontend --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time: Next.js server-side calls go through Docker network
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    container_name: trax_frontend
    restart: unless-stopped
    environment:
      # Runtime: browser calls go to the public EC2 IP
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - '3000:3000'
    depends_on:
      - backend

  # -- DB Seeder (dev only, runs once then exits) -------------------------------
  seeder:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trax_seeder
    command: python -m app.db.seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: 'no'

volumes:
  mysql_data: